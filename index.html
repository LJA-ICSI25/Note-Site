<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taking App</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Folders</h2>
                <div class="header-actions">
                    <input type="file" id="import-file" accept=".txt" style="display: none;">
                    <button id="import-btn" class="btn icon-btn" title="Import TXT"><i
                            class="fas fa-file-import"></i></button>
                    <button id="new-folder-btn" class="btn icon-btn" title="New Folder"><i
                            class="fas fa-folder-plus"></i></button>
                </div>
            </div>
            <div class="folders-list" id="folders-list">
                <!-- Folder items will be injected here -->
            </div>

            <div class="sidebar-header border-top">
                <h2>Notes</h2>
                <button id="new-note-btn" class="btn primary-btn"><i class="fas fa-plus"></i> New Note</button>
            </div>
            <div class="notes-list" id="notes-list">
                <!-- Note items will be injected here -->
            </div>
        </aside>

        <!-- Main Content (Editor) -->
        <main class="main-content">
            <div class="editor-header">
                <input type="text" id="note-title" placeholder="Note Title..." autocomplete="off">
            </div>

            <div class="toolbar">
                <button class="format-btn format-heading" data-command="formatBlock" data-value="H1"
                    title="Heading 1">H1</button>
                <button class="format-btn format-heading" data-command="formatBlock" data-value="H2"
                    title="Heading 2">H2</button>
                <button class="format-btn format-heading" data-command="formatBlock" data-value="H3"
                    title="Heading 3">H3</button>
                <div class="divider"></div>
                <button class="format-btn" data-command="bold" title="Bold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" data-command="italic" title="Italic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" data-command="underline" title="Underline"><i
                        class="fas fa-underline"></i></button>
                <button class="format-btn" data-command="strikeThrough" title="Strikethrough"><i
                        class="fas fa-strikethrough"></i></button>
                <div class="divider"></div>
                <button class="format-btn" data-command="justifyLeft" title="Align Left"><i
                        class="fas fa-align-left"></i></button>
                <button class="format-btn" data-command="justifyCenter" title="Align Center"><i
                        class="fas fa-align-center"></i></button>
                <button class="format-btn" data-command="justifyRight" title="Align Right"><i
                        class="fas fa-align-right"></i></button>
                <button class="format-btn" data-command="justifyFull" title="Justify"><i
                        class="fas fa-align-justify"></i></button>
                <div class="divider"></div>
                <button class="format-btn" data-command="insertUnorderedList" title="Bullet List"><i
                        class="fas fa-list-ul"></i></button>
                <button class="format-btn" data-command="insertOrderedList" title="Numbered List"><i
                        class="fas fa-list-ol"></i></button>
                <div class="divider"></div>
                <button id="indent-btn" class="format-btn" title="Indent"><i class="fas fa-indent"></i></button>
                <button id="outdent-btn" class="format-btn" title="Outdent"><i class="fas fa-outdent"></i></button>
            </div>

            <div class="editor-container">
                <div id="editor" contenteditable="true" aria-multiline="true" role="textbox"
                    placeholder="Start typing here..."></div>
            </div>
        </main>
    </div>

    <!-- Custom Prompt Modal -->
    <div id="folder-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Create New Folder</h3>
            <input type="text" id="folder-name-input" placeholder="Folder Name" autocomplete="off">
            <div class="modal-actions">
                <button id="cancel-folder-btn" class="btn">Cancel</button>
                <button id="submit-folder-btn" class="btn primary-btn">Create</button>
            </div>
        </div>
    </div>

    <!-- Rename Folder Modal -->
    <div id="rename-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Rename Folder</h3>
            <input type="text" id="rename-folder-input" placeholder="New Folder Name" autocomplete="off">
            <div class="modal-actions">
                <button id="cancel-rename-btn" class="btn">Cancel</button>
                <button id="submit-rename-btn" class="btn primary-btn">Rename</button>
            </div>
        </div>
    </div>

    <!-- Context Menu For Folders -->
    <div id="folder-context-menu" class="context-menu hidden">
        <div class="context-menu-item" id="context-rename">
            <i class="fas fa-edit"></i> Rename
        </div>
        <div class="context-menu-item" id="context-color">
            <i class="fas fa-palette"></i> Change Color
            <input type="color" id="folder-color-picker" style="opacity: 0; position: absolute; width: 0; height: 0;">
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" id="context-delete">
            <i class="fas fa-trash"></i> Delete
        </div>
    </div>

    <!-- Move Note Modal -->
    <div id="move-note-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Move Note</h3>
            <select id="move-note-select" class="folder-select">
                <!-- Options populated dynamically -->
            </select>
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="cancel-move-note-btn" class="btn">Cancel</button>
                <button id="submit-move-note-btn" class="btn primary-btn">Move</button>
            </div>
        </div>
    </div>

    <!-- Context Menu For Notes -->
    <div id="note-context-menu" class="context-menu hidden">
        <div class="context-menu-item" id="note-context-move">
            <i class="fas fa-folder-open"></i> Move To...
        </div>
        <div class="context-menu-item" id="note-context-export">
            <i class="fas fa-file-export"></i> Export As TXT
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" id="note-context-delete">
            <i class="fas fa-trash"></i> Delete
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
